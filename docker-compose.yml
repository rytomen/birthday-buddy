services:
  app:
    build: .
    image: ghcr.io/rytomen/birthday-buddy:latest
    environment:
      DATABASE_URL: postgresql+psycopg2://birthday:${POSTGRES_PASSWORD}@db:5432/birthday
      REDIS_URL: redis://cache:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: birthday
      POSTGRES_USER: birthday
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birthday"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

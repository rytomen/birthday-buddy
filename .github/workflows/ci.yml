name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Проверки качества и безопасности идут ПАРАЛЛЕЛЬНО ----
  lint:
    name: Lint (flake8 + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: black --check .
      - run: flake8 .

  test:
    name: Test (pytest, matrix)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -v

  sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - run: pip install bandit==1.7.8
      - run: bandit -r app -ll

  sca:
    name: SCA (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt

  # ---- Security Gate: блокирует дальше, если SAST или SCA упали ----
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca]
    steps:
      - run: echo "SAST и SCA пройдены - проверки безопасности зеленые."

  # ---- Публикация образа: только после всех проверок, при пуше в main ----
  publish:
    name: Build and push image (GHCR)
    runs-on: ubuntu-latest
    needs: [lint, test, security-gate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/birthday-buddy:latest
            ghcr.io/${{ github.repository_owner }}/birthday-buddy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
